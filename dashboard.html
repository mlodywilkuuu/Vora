<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora AI - Twój Panel Asystenta</title>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_7qh1u87qh1u87qh1-removebg-preview.png">
    <style>
        :root {
            /* KOLORY GRADIENTU Z LITERY V */
            --v-pink: #ff007f;
            --v-purple: #9900ff;
            --v-blue: #00ffff;
            
            /* KOLORY INTERFEJSU (Glassmorphism, Ciemny Motyw) */
            --app-bg: transparent; /* Tło unosi się na gradiencie body */
            --sidebar-bg: rgba(0, 0, 0, 0.4); /* Półprzezroczysty boczny panel */
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-color: var(--v-blue);
            
            /* KOLORY DYMKÓW CZATU */
            --user-bubble: rgba(255, 0, 127, 0.2); /* Różowy V dla użytkownika */
            --fora-bubble: rgba(255, 255, 255, 0.05); /* Przezroczysty dla Vory */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* TŁO CAŁEJ APLIKACJI (Pełny Gradient Vora) */
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex; /* Flex dla sidebara i czatu */
            overflow: hidden;
            position: relative;
        }

        /* Pseudo-element dla efektu przyciemnienia tła gradientowego */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); /* Przyciemnienie gradientu dla czytelności */
            z-index: -1;
        }

        /* --- NAGŁÓWEK Minimalny --- */
        .app-header {
            width: 100%; height: 70px;
            padding: 0 30px; display: flex;
            align-items: center; box-sizing: border-box; 
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: 10; border-bottom: 1px solid var(--border-color);
            position: fixed; top: 0; left: 0;
        }

        .logo-group {
            display: flex; align-items: flex-end; gap: 8px;
            text-decoration: none;
        }

        .header-logo {
            font-size: 1.5em; font-weight: 900;
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
        }

        /* !!! NOWY Napis v1.0 z jaskrawą czcionką !!! */
        .header-version {
            font-family: 'Courier New', Courier, monospace; /* Fajna, techniczna czcionka */
            font-size: 0.8em; font-weight: bold;
            color: var(--accent-color); /* Jaskrawy błękit */
            opacity: 0.8; margin-bottom: 2px;
        }

        /* ========================================= */
        /* --- PANEL BOCZNY NA LEWO (Sidebar) !!! --- */
        /* ========================================= */
        .app-sidebar {
            width: 280px; height: calc(100% - 70px); /* Wysokość pomniejszona o header */
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            padding: 20px 15px; box-sizing: border-box;
            z-index: 8;
            position: fixed; top: 70px; left: 0; /* Pod headerem */
        }

        /* Przycisk Nowa Rozmowa (Bez przeładowania strony!) */
        .btn-new-chat {
            width: 100%;
            padding: 12px 18px; border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.06);
            color: var(--text-primary); font-weight: bold; font-size: 0.95em;
            border: 1px solid var(--border-color); cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            transition: all 0.2s; text-decoration: none; margin-bottom: 30px;
            box-sizing: border-box;
        }

        .btn-new-chat:hover { background-color: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.15); }

        /* Sekcja Historii Czatu */
        .sidebar-history-section {
            flex: 1; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: var(--border-color) transparent;
            padding-right: 5px;
        }

        .sidebar-history-section::-webkit-scrollbar { width: 4px; }
        .sidebar-history-section::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 2px; }

        .history-title { font-size: 0.85em; font-weight: bold; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* Lista Tytułów Czatów (Działająca i Przełączalna!) */
        .chat-titles-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }

        .chat-title-item {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            padding: 12px; border-radius: 10px; color: var(--text-primary);
            text-decoration: none; cursor: pointer; transition: background-color 0.2s; font-size: 0.9em;
            position: relative;
        }

        .chat-title-item:hover { background-color: rgba(255, 255, 255, 0.03); }
        .chat-title-item.active { background-color: rgba(255, 255, 255, 0.05); color: var(--accent-color); font-weight: bold;}

        /* Tytuł tekstu z elipsą */
        .chat-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Ikona kosza uaktywnia sie na hover */
        .btn-delete-chat {
            background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 5px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s, color 0.2s;
        }
        .chat-title-item:hover .btn-delete-chat { opacity: 1; }
        .btn-delete-chat:hover { color: #ff0000; }

        /* Stopka Sidebara */
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.8em; text-align: center; }

        /* ========================================= */
        /* --- GŁÓWNA TREŚĆ NA PRAWO (Czat) !!! --- */
        /* ========================================= */
        .app-main {
            flex: 1; display: flex; flex-direction: column;
            width: calc(100% - 280px); /* Szerokość pomniejszona o sidebar */
            margin: 70px 0 0 280px; /* Margines od header i sidebar */
            padding: 20px 0;
            box-sizing: border-box; position: relative;
            z-index: 5; overflow: hidden;
            background-color: var(--app-bg);
        }

        /* --- Obszar Historii Czatu (Dymki) --- */
        .chat-history {
            flex: 1; width: 100%; max-width: 900px; margin: 0 auto; overflow-y: auto; padding: 20px 30px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 20px;
            margin-bottom: 20px; scrollbar-width: thin; scrollbar-color: var(--border-color) transparent;
        }

        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 3px; }

        /* Style Dymków */
        .message { max-width: 75%; padding: 15px 20px; border-radius: 18px; font-size: 1em; line-height: 1.5; word-wrap: break-word; }

        .message.user { align-self: flex-end; background-color: var(--user-bubble); color: #ffffff; border-bottom-right-radius: 4px; }

        .message.fora { align-self: flex-start; background-color: var(--fora-bubble); color: #ffffff; border-top-left-radius: 4px; border: 1px solid var(--border-color); }

        /* Animacja pisania */
        .message.fora.loading { padding: 15px 25px; color: var(--text-secondary); font-style: italic; display: flex; gap: 5px; }
        .dot { width: 6px; height: 6px; background-color: var(--text-secondary); border-radius: 50%; opacity: 0.5; animation: dotPulse 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* --- Pole Zapytania (Input) --- */
        .chat-input-area { width: 100%; max-width: 900px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; margin-bottom: 20px; }

        .chat-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.06); /* Subtelna przezroczystość */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 28px; border: 1px solid var(--border-color);
            padding: 15px 25px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; gap: 15px; transition: all 0.2s;
        }

        .chat-container:focus-within { border-color: rgba(0, 255, 255, 0.3); background: rgba(255, 255, 255, 0.08); }

        /* Input tekstowy */
        .chat-input-wrapper { display: flex; align-items: center; gap: 15px; }

        .chat-textarea {
            flex: 1; background: transparent; border: none; color: var(--text-primary);
            font-size: 1.1em; padding: 10px 0; outline: none; resize: none;
            min-height: 24px; max-height: 200px; overflow-y: auto; scrollbar-width: none;
        }
        .chat-textarea::placeholder { color: rgba(255, 255, 255, 0.4); }

        /* Pasek narzędzi w inpucie */
        .chat-toolbar { display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-size: 0.9em; }
        .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 15px; }

        .toolbar-icon-btn { background: transparent; border: none; color: inherit; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .toolbar-icon-btn:hover { color: #ffffff; }

        /* Przycisk wysyłania (Ikona mikrofonu / Strzałka) */
        .btn-send {
            background-color: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.4);
            width: 44px; height: 44px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .btn-send.active { background-color: var(--accent-color); color: #111111; }
        .btn-send:hover { opacity: 0.9; }

    </style>
</head>

<script type="module">
    // !!! NOWE: Importujemy działający rdzeń AI z oddzielnego pliku !!! ===
    import { wyslijDoRdzeniaAI } from './vora-core.js';

    // === ELEMENTY CZATU ===
    const inputEl = document.getElementById('mainChatInput');
    const btnSendEl = document.getElementById('btnSend');
    const historyEl = document.getElementById('chatHistory');
    const historyListEl = document.getElementById('chatHistoryList');
    const btnNewChatEl = document.getElementById('btnNewChat'); // Przycisk nowej rozmowy

    // =========================================
    // OBSŁUGA INTERFEJSU CZATU (Input)
    // =========================================

    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto'; // Reset
        inputEl.style.height = inputEl.scrollHeight + 'px'; // Ustaw nową

        if (inputEl.value.trim().length > 0) {
            btnSendEl.classList.add('active');
        } else {
            btnSendEl.classList.remove('active');
        }
    });

    // =========================================
    // !!! NOWE: OBSŁUGA TRWAŁEJ HISTORII (localStorage) !!! ===
    // =========================================

    // Klucz do zapisu w pamięci lokalnej
    const STORAGE_KEY = 'vora_chat_history_mateusz';

    // --- Funkcja ładowania historii przy starcie strony ---
    const ladujHistorieZPamieci = () => {
        const zapisaneCzaty = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        // Dodaj każdy zapisany czat do sidebara (od najnowszego)
        zapisaneCzaty.forEach(chat => dodajCzatDoWidokuSidebar(chat.tytul, chat.id, false));
    };

    // --- Funkcja zapisu nowego czatu do pamięci ---
    const zapiszNowyCzatDoPamieci = (tytul, id) => {
        const zapisaneCzaty = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        zapisaneCzaty.push({ tytul, id, wiadomosci: [] }); // Wiadomości w tej wersji są puste
        localStorage.setItem(STORAGE_KEY, JSON.stringify(zapisaneCzaty));
    };

    // --- Funkcja usuwania czatu z pamięci ---
    const usunCzatZPamieci = (id) => {
        let zapisaneCzaty = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        zapisaneCzaty = zapisaneCzaty.filter(chat => chat.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(zapisaneCzaty));
    };

    // =========================================
    // OBSŁUGA SIDEBARA (WIZUALIZACJA) ===
    // =========================================
    
    // --- Dodawanie czatu do Sidebara (Wizualnie) ---
    const dodajCzatDoWidokuSidebar = (tytul, id, czyZaznaczyc) => {
        const titleItemEl = document.createElement('li');
        titleItemEl.classList.add('chat-title-item');
        if (czyZaznaczyc) titleItemEl.classList.add('active');
        titleItemEl.dataset.chatId = id; // Przypisz ID
        
        const textEl = document.createElement('span');
        textEl.classList.add('chat-item-text');
        textEl.innerText = tytul;
        
        const deleteBtnEl = document.createElement('button');
        deleteBtnEl.classList.add('btn-delete-chat');
        deleteBtnEl.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';
        
        deleteBtnEl.addEventListener('click', (e) => {
            e.stopPropagation(); // Zapobiega kliknięciu w tytuł czatu
            if (confirm(`Czy na pewno chcesz usunąć czat "${tytul}"?`)) {
                titleItemEl.remove();
                usunCzatZPamieci(id); // Usuń też z pamięci!
            }
        });

        // Kliknięcie w tytuł czatu
        titleItemEl.addEventListener('click', () => {
            const actives = historyListEl.querySelectorAll('.active');
            actives.forEach(el => el.classList.remove('active'));
            titleItemEl.classList.add('active');
            // (W tej wersji czat tylko się zaznacza, nie ładuje starej treści)
        });

        titleItemEl.appendChild(textEl); titleItemEl.appendChild(deleteBtnEl);
        historyListEl.prepend(titleItemEl); // Dodaj na początek listy
    };

    // =========================================
    // OBSŁUGA CZATU I NOWEGO RDZENIA AI !!! NAPRAWIONE !!! ===
    // =========================================

    const dodajWiadomoscDoWidoku = (tresc, czyUser) => {
        const messageEl = document.createElement('div');
        messageEl.classList.add('message');
        messageEl.classList.add(czyUser ? 'user' : 'fora');
        messageEl.innerText = tresc; 
        
        historyEl.appendChild(messageEl);
        historyEl.scrollTop = historyEl.scrollHeight; // Przewiń na dół
    };

    const pokazPisanieVory = () => {
        const loadingEl = document.createElement('div');
        loadingEl.classList.add('message', 'fora', 'loading');
        loadingEl.id = 'foraLoading';
        loadingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        historyEl.appendChild(loadingEl);
        historyEl.scrollTop = historyEl.scrollHeight;
    };

    const ukryjPisanieVory = () => {
        const loadingEl = document.getElementById('foraLoading');
        if (loadingEl) loadingEl.remove();
    };

    // === PRAWDZIWA KOMUNIKACJA Z RDZENIEM AI ===
    const wyslijZapytanieDoAI = async (trescUsera) => {
        const messageText = trescUsera.trim();
        if (messageText.length === 0) return;

        inputEl.value = ""; inputEl.style.height = 'auto'; btnSendEl.classList.remove('active'); 

        // !!! NAPRAWIONO: Sprawdź, czy to pierwsza wiadomość w nowym czacie !!! ===
        const messagesBefore = historyEl.getElementsByClassName('message user');
        if (messagesBefore.length === 0) {
            // Generuj Normalny tytuł z wiadomości
            let tytulCzatu = messageText;
            if (tytulCzatu.length > 30) { tytulCzatu = tytulCzatu.substring(0, 30) + '...'; }
            const chatId = Date.now().toString(); // Generuj unikalne ID (timestamp)

            dodajCzatDoWidokuSidebar(tytulCzatu, chatId, true); // Pokaż w sidebarze i zaznacz
            zapiszNowyCzatDoPamieci(tytulCzatu, chatId); // Zapisz w pamięci lokalnej!
        }

        // 1. Dodaj Twoje pytanie do czatu na stronie
        dodajWiadomoscDoWidoku(messageText, true);
        
        // 2. Pokaż kropki pisania
        pokazPisanieVory();

        // 3. !!! WYWOŁAJ NOWY, STABILNY RDZEŃ AI !!! ===
        const odpowiedzVory = await wyslijDoRdzeniaAI(messageText);

        // 4. Pokaz odpowiedź Vory w czacie
        ukryjPisanieVory(); // Ukryj kropki
        dodajWiadomoscDoWidoku(odpowiedzVory, false); // Dodaj odpowiedź
    };

    // =========================================
    // OBSŁUGA NOWEJ ROZMOWY
    // =========================================
    
    btnNewChatEl.addEventListener('click', () => {
        historyEl.innerHTML = '';
        inputEl.value = '';
        inputEl.style.height = 'auto';
        const active = historyListEl.querySelector('.active');
        if (active) active.classList.remove('active');
        console.log("Rozpoczęto nową rozmowę.");
    });

    // =========================================
    // START APLIKACJI
    // =========================================

    // Załaduj czaty z pamięci przy starcie !!! ===
    ladujHistorieZPamieci();

    // LISTENERY
    btnSendEl.addEventListener('click', () => {
        const text = inputEl.value;
        wyslijZapytanieDoAI(text);
    });

    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault(); // Zapobiega nowej linii
            const text = inputEl.value;
            wyslijZapytanieDoAI(text);
        }
    });

</script>

</body>

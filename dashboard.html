            --v-purple: #7a00cc;
            --v-blue: #00cccc;

        body {

            margin: 0;
            /* TŁO VORY (Gradient) */
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Dodatkowy pseudo-element dla efektu przyciemnienia tła */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75); /* Silne przyciemnienie dla czytelności czatu */

        /* --- NAGŁÓWEK (Top Bar) --- */

            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }

        .header-logo {
            font-size: 1.5em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);

            color: #111111;

        .app-main {

            font-size: 2em;

            color: var(--text-secondary);
            margin: 0;
        }

        .welcome-headline {
            font-size: 3em;
            font-weight: 900;
            margin: 10px 0;
            color: #ffffff;
        }

        .chat-history {
            flex: 1;
            width: 100%;

            padding: 20px;

        .started-chat .welcome-section { opacity: 0; margin: 0; height: 0; overflow: hidden; }
        .started-chat .quick-actions-area { display: none !important; }

    </style>

    const inputEl = document.getElementById('mainChatInput');
    const btnSendEl = document.getElementById('btnSend');
    const historyEl = document.getElementById('chatHistory');
    const bodyEl = document.getElementById('oraAppBody');
    const quickAreaEl = document.getElementById('quickActionsArea');

    let isChatStarted = false; // Czy czat już się zaczął (pomoże ukryć powitanie)

    // =========================================
    // FUNKCJE POMOCNICZE CZATU
    // =========================================

    // --- Uruchomienie interfejsu czatu (ukrycie sugestii) ---
    const startChatInterface = () => {
        if (!isChatStarted) {
            isChatStarted = true;
            bodyEl.classList.add('started-chat'); // Dodaje klasę CSS, która ukrywa powitanie
            quickAreaEl.style.display = 'none'; // Dodatkowe ukrycie sugestii
        }
    };

    // --- Dynamiczne zmienianie wysokości inputa ---
    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto'; // Reset
        inputEl.style.height = inputEl.scrollHeight + 'px'; // Ustaw nową

        // Aktywuj przycisk strzałki
        if (inputEl.value.trim().length > 0) {
            btnSendEl.classList.add('active');
        } else {
            btnSendEl.classList.remove('active');
        }
    });

    // --- Dodawanie wiadomości do historii czatu na stronie ---
    const dodajWiadomoscDoWidoku = (tresc, czyUser) => {
        startChatInterface(); // Upewnij się, że interfejs czatu jest włączony

        const messageEl = document.createElement('div');
        messageEl.classList.add('message');

        // Prostym tekstem, aby nie wklejać HTMLa
        messageEl.innerText = tresc; 
        
        historyEl.appendChild(messageEl);
        
        // Przewiń czat na sam dół
        historyEl.scrollTop = historyEl.scrollHeight;

        dodajWiadomoscDoWidoku(trescUsera, true);
        
        // 2. Pokaż animację pisania
        pokazPisanieVory();

        // 3. PRZYGOTUJ DANE DLA GOOGLE GEMINI
        const payload = {
            contents: [{
                parts: [{ text: trescUsera }]
            }]
        };

        try {
            // 4. WYŚLIJ PRAWDZIWE ZAPYTANIE DO GOOGLE
            const response = await fetch(GEMINI_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('Błąd połączenia z Gemini AI (API Key lub URL)');

            const data = await response.json();

            // 5. WYDOBĄDŹ ODPOWIEDŹ Z DANYCH GOOGLE
            // (Google zwraca dane w specyficznym formacie: data.candidates[0].content.parts[0].text)
            const trescVory = data.candidates[0].content.parts[0].text;

            // 6. Pokaz odpowiedź Vory w czacie
            ukryjPisanieVory(); // Ukryj kropki
            dodajWiadomoscDoWidoku(trescVory, false); // Dodaj odpowiedź

        } catch (error) {
            // 7. Obsługa błędów
            console.error("Błąd Vory:", error);
            ukryjPisanieVory();
            dodajWiadomoscDoWidoku("Przepraszam, Mateusz, ale mam chwilowy błąd połączenia z moim rdzeniem AI. Spróbuj za chwilę.", false);
        }
    };

    // =========================================
    // OBSŁUGA FORMULARZA I ENTERA
    // =========================================

    const obslozWyslanie = () => {
        const text = inputEl.value.trim();
        if (text.length > 0) {
            wyslijZapytanieDoAI(text);
        }
    };

    // --- Listener dla przycisku Wyślij (Strzałka) ---
    btnSendEl.addEventListener('click', obslozWyslanie);

    // --- Listener dla Entera w inpucie ---
    inputEl.addEventListener('keydown', (e) => {
        // Jeśli wciśnięto Enter BEZ Shifta (Shift+Enter robi nową linię)
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault(); // Zapobiega nowej linii
            obslozWyslanie();
        }
    });

</script>

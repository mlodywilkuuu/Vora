<script type="module">
    // IMPORTUJ Rdzeń AI jako moduł
    import { wyslijZapytanieDoGemini, generujTytulCzatu } from './vora-core.js';

    // === ELEMENTY INTERFEJSU (DOM) ===
    const inputEl = document.getElementById('mainChatInput');
    const btnSendEl = document.getElementById('btnSend');
    const historyEl = document.getElementById('chatHistory');
    const historyListEl = document.getElementById('chatHistoryList');

    // === ELEMENTY ROZMOWY GŁOSOWEJ ===
    const btnSpeechEl = document.getElementById('btnSpeechInput');
    const overlaySpeechEl = document.getElementById('poraSpeechOverlay');
    const btnCloseSpeechEl = document.getElementById('btnCloseSpeech');

    // =========================================
    // OBSŁUGA INTERFEJSU CZATU (Wygląd Inputa)
    // =========================================

    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto'; // Reset
        inputEl.style.height = inputEl.scrollHeight + 'px'; // Ustaw nową wysokości

        // Aktywuj strzałkę gdy jest tekst
        if (inputEl.value.trim().length > 0) {
            btnSendEl.classList.add('active');
        } else {
            btnSendEl.classList.remove('active');
        }
    });

    // =========================================
    // OBSŁUGA DYNAMICZNEGO SIDEBARA (HISTORIA)
    // =========================================
    
    // Funkcja dodawania nowego czatu do historii Sidebara (Normalna nazwa)
    const dodajCzatDoHistoriiSidebar = (trescUsera) => {
        // Użyj Rdzenia do wygenerowania inteligentnego tytułu
        const tytulCzatu = generujTytulCzatu(trescUsera);

        // Stwórz kontener tytułu
        const titleItemEl = document.createElement('li');
        titleItemEl.classList.add('chat-title-item');
        
        // Stwórz tekst z tytułem
        const textEl = document.createElement('span');
        textEl.classList.add('chat-item-text');
        textEl.innerText = tytulCzatu;
        
        // Stwórz kosz do usuwania czatu
        const deleteBtnEl = document.createElement('button');
        deleteBtnEl.classList.add('btn-delete-chat');
        deleteBtnEl.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>';
        
        deleteBtnEl.addEventListener('click', (e) => {
            e.stopPropagation(); // Zapobiega kliknięciu w tytuł czatu
            if (confirm(`Czy na pewno chcesz usunąć czat "${tytulCzatu}"?`)) {
                titleItemEl.remove();
            }
        });

        // Połącz elementy i dodaj na górę listy historii
        titleItemEl.appendChild(textEl); titleItemEl.appendChild(deleteBtnEl);
        historyListEl.prepend(titleItemEl); // Dodaj na początek listy
    };

    // =========================================
    // OBSŁUGA ROZMOWY GŁOSOWEJ (Pulsujące kółko)
    // =========================================

    btnSpeechEl.addEventListener('click', () => {
        overlaySpeechEl.classList.add('active'); // Pokaż panel hlasowy
    });

    btnCloseSpeechEl.addEventListener('click', () => {
        overlaySpeechEl.classList.remove('active'); // Zamknij panel
    });

    // =========================================
    // OBSŁUGA CZATU (Wizualizacja)
    // =========================================

    const dodajWiadomoscDoWidoku = (tresc, czyUser) => {
        const messageEl = document.createElement('div');
        messageEl.classList.add('message');
        messageEl.classList.add(czyUser ? 'user' : 'fora');
        messageEl.innerText = tresc; 
        
        historyEl.appendChild(messageEl);
        historyEl.scrollTop = historyEl.scrollHeight; // Przewiń na dół
    };

    const pokazPisanieVory = () => {
        const loadingEl = document.createElement('div');
        loadingEl.classList.add('message', 'fora', 'loading');
        loadingEl.id = 'foraLoading';
        loadingEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        historyEl.appendChild(loadingEl);
        historyEl.scrollTop = historyEl.scrollHeight;
    };

    const ukryjPisanieVory = () => {
        const loadingEl = document.getElementById('foraLoading');
        if (loadingEl) loadingEl.remove();
    };

    // =========================================
    // GŁÓWNA LOGIKA WYSYŁANIA (Łącznik Interfejsu z Rdzeniem)
    // =========================================

    const wykonajWyslanieZapytania = async () => {
        const text = inputEl.value.trim();
        if (text.length === 0) return;

        // Reset interfejsu
        inputEl.value = ""; inputEl.style.height = 'auto'; btnSendEl.classList.remove('active'); 

        // 1. Sprawdź, czy to pierwsza wiadomość (Zarządzanie Historią)
        const messagesBefore = historyEl.getElementsByClassName('message user');
        if (messagesBefore.length === 0) {
            dodajCzatDoHistoriiSidebar(text); 
        }

        // 2. Dodaj Twoje pytanie do widoku
        dodajWiadomoscDoWidoku(text, true);
        
        // 3. Pokaż animację pisania
        pokazPisanieVory();

        // 4. WYWOŁAJ RDZEŃ AI (Zewnętrzna funkcja)
        const odpowiedzAI = await wyslijZapytanieDoGemini(text);

        // 5. Pokaz odpowiedź Vory w czacie
        ukryjPisanieVory(); // Ukryj kropki
        dodajWiadomoscDoWidoku(odpowiedzAI, false); // Dodaj odpowiedź
    };

    // =========================================
    // LISTENERY FORMULARZA I ENTERA
    // =========================================

    // Kliknięcie strzałki
    btnSendEl.addEventListener('click', wykonajWyslanieZapytania);

    // Enter w inpucie
    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault(); // Zapobiega nowej linii
            wykonajWyslanieZapytania();
        }
    });

</script>

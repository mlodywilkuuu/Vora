<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora - Zaloguj się lub Zarejestruj</title>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_7qh1u87qh1u87qh1-removebg-preview.png">
    <style>
        :root {
            /* PRZYWRÓCONY JASKRAWY GRADIENT V */
            --v-pink: #ff007f;
            --v-purple: #9900ff;
            --v-blue: #00ffff;
            
            /* KOLORY ELEMENTÓW INTERFEJSU (Glassmorphism) */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: var(--v-blue);
            --glass-bg: rgba(255, 255, 255, 0.02); /* Przezroczyste tło panelu */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* TŁO CAŁEJ STRONY W GRADIENTU V */
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Dodatkowy pseudo-element dla efektu przyciemnienia tła */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); /* Lekkie przyciemnienie gradientu */
            z-index: -1;
        }

        /* GŁÓWNY PANEL LOGOWANIA - GLASSMORPHISM */
        .auth-container {
            background-color: var(--glass-bg);
            backdrop-filter: blur(15px); /* Efekt rozmycia tła strony */
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 480px;
            padding: 60px 40px;
            border-radius: 24px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            position: relative;
            transition: transform 0.3s ease-in-out;
        }

        /* Przycisk powrotu do strony głównej */
        .back-to-home {
            position: absolute;
            top: 25px; left: 25px;
            font-size: 0.9em;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-to-home:hover {
            color: #ffffff;
        }

        .auth-headline {
            font-size: 2.5em;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-subheadline {
            color: var(--text-secondary);
            text-align: center;
            font-size: 1em;
            margin-bottom: 45px;
        }

        /* Formularz e-mail/hasło */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 22px;
            margin-bottom: 35px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .form-group label {
            font-size: 0.85em;
            color: var(--text-secondary);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-form input {
            padding: 16px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1em;
            transition: border-color 0.2s, background 0.2s;
        }

        .auth-form input:focus {
            outline: none;
            border-color: rgba(0, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn {
            padding: 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-auth-submit {
            background-color: var(--accent-color);
            color: #060a1f; /* Ciemny tekst na jasnym tle */
            margin-top: 15px;
        }

        .btn-auth-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Stopka panelu (przełączanie trybów) */
        .auth-footer-text {
            color: var(--text-secondary);
            text-align: center;
            font-size: 0.95em;
            margin-top: 20px;
        }

        .toggle-auth-mode {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        /* Style dla ukrywania/pokazywania trybów */
        #register-mode-content { display: none; }

    </style>
</head>
<body>

<a href="index.html" class="back-to-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Wróć
</a>

<div class="auth-container">
    
    <div id="login-mode-content">
        <h2 class="auth-headline">Witaj ponownie</h2>
        <p class="auth-subheadline">Zaloguj się, aby kontynuować pracę z Vorą.</p>
        
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="login-email">Adres E-mail</label>
                <input type="email" id="login-email" placeholder="twoj@email.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Hasło</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-auth-submit">Zaloguj się</button>
        </form>
    </div>
    
    <div id="register-mode-content">
        <h2 class="auth-headline">Stwórz konto</h2>
        <p class="auth-subheadline">Dołącz do Vora i odkryj pełną moc AI.</p>
        
        <form class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="register-email">Adres E-mail</label>
                <input type="email" id="register-email" placeholder="twoj@email.com" required>
            </div>
            <div class="form-group">
                <label for="register-password">Hasło</label>
                <input type="password" id="register-password" placeholder="Min. 8 znaków" required>
            </div>
            <button type="submit" class="btn btn-auth-submit">Zarejestruj się</button>
        </form>
    </div>
    
    <p class="auth-footer-text" id="authFooter">
        Nie masz konta? <span class="toggle-auth-mode" id="toRegisterBtn">Zarejestruj się</span>
    </p>
    
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // === WKLEJ TUTAJ SWOJĄ KONFIGURACJĘ FIREBASE (z konsoli punkt A.3) ===
    const firebaseConfig = {
        apiKey: "WKLEJ_TWOJE_API_KEY",
        authDomain: "twoj-projekt.firebaseapp.com",
        projectId: "twoj-projekt",
        storageBucket: "twoj-projekt.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef123456"
    };

    // Zainicjuj Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // =========================================
    // OBSŁUGA INTERFEJSU I FORMULARZY
    // =========================================
    
    const loginContent = document.getElementById('login-mode-content');
    const registerContent = document.getElementById('register-mode-content');
    const toRegisterBtn = document.getElementById('toRegisterBtn');
    const authFooter = document.getElementById('authFooter');

    // --- Przełączanie Trybów (Logowanie/Rejestracja) ---

    const showRegister = () => {
        loginContent.style.display = 'none';
        registerContent.style.display = 'block';
        authFooter.innerHTML = 'Masz już konto? <span class="toggle-auth-mode" id="toLoginBtn">Zaloguj się</span>';
        
        // Musimy dodać listener do nowo stworzonego elementu
        document.getElementById('toLoginBtn').addEventListener('click', showLogin);
    };

    const showLogin = () => {
        registerContent.style.display = 'none';
        loginContent.style.display = 'block';
        authFooter.innerHTML = 'Nie masz konta? <span class="toggle-auth-mode" id="toRegisterBtn">Zarejestruj się</span>';
        
        // Musimy dodać listener do nowo stworzonego elementu
        document.getElementById('toRegisterBtn').addEventListener('click', showRegister);
    };

    // Początkowy listener (dla domyślnego stanu)
    toRegisterBtn.addEventListener('click', showRegister);

    // =========================================
    // PRAWDZIWA OBSŁUGA FORMULARZY Z FIREBASE
    // =========================================

    // --- Obsługa prawdziwej Rejestracji ---
    document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault(); // Zapobiega przeładowaniu strony
        
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;

        // Firebase: Stwórz nowego użytkownika
        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // Sukces
                const user = userCredential.user;
                alert(`Konto w Vorze stworzone pomyślnie dla ${user.email}! Jesteś zalogowany.`);
                // Tutaj możesz przekierować użytkownika na stronę główną lub do panelu
            })
            .catch((error) => {
                // Błąd (np. e-mail już istnieje, hasło za słabe)
                const errorCode = error.code;
                const errorMessage = error.message;
                alert(`Błąd rejestracji: ${errorMessage} (${errorCode})`);
            });
    });

    // --- Obsługa prawdziwego Logowania ---
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault(); // Zapobiega przeładowaniu strony
        
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        // Firebase: Zaloguj istniejącego użytkownika
        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // Sukces
                const user = userCredential.user;
                alert(`Pomyślnie zalogowano w Vorze jako ${user.email}!`);
                // Tutaj możesz przekierować użytkownika na stronę główną lub do panelu
            })
            .catch((error) => {
                // Błąd (np. złe hasło, użytkownik nie istnieje)
                const errorCode = error.code;
                const errorMessage = error.message;
                alert(`Błąd logowania: ${errorMessage} (${errorCode})`);
            });
    });

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora - Zaloguj się lub Zarejestruj</title>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_7qh1u87qh1u87qh1-removebg-preview.png">
    <style>
        :root {
            /* KOLORY GRADIENTU Z LITERY V */
            --v-pink: #ff007f;
            --v-purple: #9900ff;
            --v-blue: #00ffff;
            
            /* KOLORY PANELU LOGOWANIA */
            --bg-color: #0a0a0a; /* Ciemne tło panelu */
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: var(--v-blue);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* TŁO CAŁEJ STRONY W GRADIENTU V */
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Dodatkowy pseudo-element dla efektu przyciemnienia tła */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); /* Lekkie przyciemnienie gradientu */
            z-index: -1;
        }

        /* GŁÓWNY PANEL LOGOWANIA */
        .auth-container {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 480px;
            padding: 60px 40px;
            border-radius: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* Przycisk powrotu do strony głównej */
        .back-to-home {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 0.9em;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-to-home:hover {
            color: #ffffff;
        }

        .auth-headline {
            font-size: 2.2em;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-subheadline {
            color: var(--text-secondary);
            text-align: center;
            font-size: 1em;
            margin-bottom: 40px;
        }

        /* Formularz e-mail/hasło */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85em;
            color: var(--text-secondary);
            font-weight: bold;
        }

        .auth-form input {
            padding: 15px;
            border-radius: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1em;
            transition: border-color 0.2s;
        }

        .auth-form input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn {
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-auth-submit {
            background-color: var(--accent-color);
            color: #111111;
            margin-top: 10px;
        }

        .btn-auth-submit:hover {
            opacity: 0.9;
        }

        /* Sekcja "lub zaloguj przez" */
        .auth-divider {
            text-align: center;
            position: relative;
            margin-bottom: 30px;
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background-color: var(--border-color);
        }

        .auth-divider::before { left: 0; }
        .auth-divider::after { right: 0; }

        /* Przyciski społecznościowe (Tylko Google!) */
        .social-auth-group {
            margin-bottom: 40px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            font-size: 0.95em;
            background: #ffffff; /* Białe tło dla Google */
            color: #111111; /* Ciemny tekst */
            border: 1px solid #dadce0;
        }

        .btn-google:hover {
            background: #f8f9fa;
        }

        /* Ikona Google (SVG z oficjalnymi kolorami) */
        .google-icon {
            width: 20px; height: 20px;
        }

        /* Stopka panelu (przełączanie trybów) */
        .auth-footer-text {
            color: var(--text-secondary);
            text-align: center;
            font-size: 0.9em;
        }

        .toggle-auth-mode {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        /* Style dla ukrywania/pokazywania trybów */
        #register-mode-content { display: none; }

    </style>
</head>
<body>

<a href="index.html" class="back-to-home">← Wróć</a>

<div class="auth-container">
    
    <div id="login-mode-content">
        <h2 class="auth-headline">Witaj ponownie</h2>
        <p class="auth-subheadline">Zaloguj się, aby kontynuować pracę z Vorą.</p>
        
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="login-email">Adres E-mail</label>
                <input type="email" id="login-email" placeholder="twoj@email.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Hasło</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-auth-submit btn">Zaloguj się</button>
        </form>
    </div>
    
    <div id="register-mode-content">
        <h2 class="auth-headline">Stwórz konto</h2>
        <p class="auth-subheadline">Dołącz do Vora i odkryj pełną moc AI.</p>
        
        <form class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="register-name">Nazwa użytkownika</label>
                <input type="text" id="register-name" placeholder="TwójNick" required>
            </div>
            <div class="form-group">
                <label for="register-email">Adres E-mail</label>
                <input type="email" id="register-email" placeholder="twoj@email.com" required>
            </div>
            <div class="form-group">
                <label for="register-password">Hasło</label>
                <input type="password" id="register-password" placeholder="Min. 8 znaków" required>
            </div>
            <button type="submit" class="btn btn-auth-submit btn">Zarejestruj się</button>
        </form>
    </div>
    
    <div class="auth-divider">lub kontynuuj przez</div>
    
    <div class="social-auth-group">
        <button class="btn btn-google" id="googleLoginBtn">
            <svg class="google-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.64 24.55c0-1.65-.15-3.23-.42-4.75H24v9h12.75c-.55 2.87-2.17 5.31-4.61 6.94l7.2 5.58C43.6 37.14 46.64 31.3 46.64 24.55z"/><path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.2-5.58c-2.18 1.46-4.96 2.39-8.69 2.39-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            Kontynuuj przez Google
        </button>
    </div>
    
    <p class="auth-footer-text" id="authFooter">
        Nie masz konta? <span class="toggle-auth-mode" id="toRegisterBtn">Zarejestruj się</span>
    </p>
    
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    // Dodano GoogleAuthProvider i signInWithPopup dla Google
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // === TWOJA KONFIGURACJA FIREBASE Z DZIAŁAJĄCYM KLUCZEM (z publicznego czatu, Mateusz!) ===
    const firebaseConfig = {
        apiKey: "AIzaSyB2sMhft45yN-PhYOJHmuiVIbknB7SKh4E",
        authDomain: "vora-9be46.firebaseapp.com",
        projectId: "vora-9be46",
        storageBucket: "vora-9be46.firebasestorage.app",
        messagingSenderId: "731447857715",
        appId: "1:731447857715:web:1a3780472b7626d0760946",
        measurementId: "G-88EH2MJNTZ"
    };

    // Zainicjuj Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider(); // Stwórz dostawcę Google

    // =========================================
    // OBSŁUGA INTERFEJSU I FORMULARZY
    // =========================================
    
    const loginContent = document.getElementById('login-mode-content');
    const registerContent = document.getElementById('register-mode-content');
    const toRegisterBtn = document.getElementById('toRegisterBtn');
    const authFooter = document.getElementById('authFooter');

    // --- Przełączanie Trybów (Logowanie/Rejestracja) ---

    const showRegister = () => {
        loginContent.style.display = 'none';
        registerContent.style.display = 'block';
        authFooter.innerHTML = 'Masz już konto? <span class="toggle-auth-mode" id="toLoginBtn">Zaloguj się</span>';
        
        // Musimy dodać listener do nowo stworzonego elementu
        document.getElementById('toLoginBtn').addEventListener('click', showLogin);
    };

    const showLogin = () => {
        registerContent.style.display = 'none';
        loginContent.style.display = 'block';
        authFooter.innerHTML = 'Nie masz konta? <span class="toggle-auth-mode" id="toRegisterBtn">Zarejestruj się</span>';
        
        // Musimy dodać listener do nowo stworzonego elementu
        document.getElementById('toRegisterBtn').addEventListener('click', showRegister);
    };

    // Początkowy listener (dla domyślnego stanu)
    toRegisterBtn.addEventListener('click', showRegister);

    // =========================================
    // PRAWDZIWA OBSŁUGA FORMULARZY Z FIREBASE
    // =========================================

    // --- Obsługa PRAWDZIWEGO Logowania Google ---
    document.getElementById('googleLoginBtn').addEventListener('click', () => {
        signInWithPopup(auth, googleProvider)
            .then((result) => {
                // Sukces: Zalogowano przez Google
                const user = result.user;
                alert(`Pomyślnie zalogowano w Vorze przez Google jako ${user.displayName} (${user.email})!`);
                // Tutaj możesz przekierować użytkownika na stronę główną lub do panelu
            })
            .catch((error) => {
                // Błąd (np. anulowanie logowania)
                const errorCode = error.code;
                const errorMessage = error.message;
                alert(`Błąd logowania Google: ${errorMessage} (${errorCode})`);
            });
    });

    // --- Obsługa prawdziwej Rejestracji E-mail/Hasło ---
    document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault(); // Zapobiega przeładowaniu strony
        
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const name = document.getElementById('register-name').value;

        // Firebase: Stwórz nowego użytkownika
        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // Sukces
                const user = userCredential.user;
                alert(`Konto w Vorze stworzone pomyślnie dla ${name} (${user.email})!`);
                // Tutaj możesz przekierować użytkownika na stronę główną lub do panelu
            })
            .catch((error) => {
                // Błąd (np. e-mail już istnieje, hasło za słabe)
                const errorCode = error.code;
                const errorMessage = error.message;
                alert(`Błąd rejestracji: ${errorMessage} (${errorCode})`);
            });
    });

    // --- Obsługa prawdziwego Logowania E-mail/Hasło ---
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault(); // Zapobiega przeładowaniu strony
        
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        // Firebase: Zaloguj istniejącego użytkownika
        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // Sukces
                const user = userCredential.user;
                alert(`Pomyślnie zalogowano w Vorze jako ${user.email}!`);
                // Tutaj możesz przekierować użytkownika na stronę główną lub do panelu
            })
            .catch((error) => {
                // Błąd (np. złe hasło, użytkownik nie istnieje)
                const errorCode = error.code;
                const errorMessage = error.message;
                alert(`Błąd logowania: ${errorMessage} (${errorCode})`);
            });
    });

</script>

</body>
</html>

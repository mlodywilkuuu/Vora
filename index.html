<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twój ulubiony Bot Muzyczny</title>
    <style>
        :root {
            /* Kolory gradientu z litery V */
            --v-gradient-start: #ff007f; /* Intensywny róż */
            --v-gradient-mid: #9900ff;   /* Fiolet */
            --v-gradient-end: #00ffff;   /* Turkus */
            
            /* Kolory tła (ciemny gradient) */
            --bg-start: #111111;
            --bg-end: #222222;

            /* Kolory tekstu i elementów */
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --btn-bg: #333333;
            --btn-hover-bg: #444444;
            
            /* Odcień przycisków i akcentów inspirowany turkusem z V */
            --accent-color: var(--v-gradient-end);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, var(--bg-end) 0%, var(--bg-start) 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Tło z efektem szkła (jak na screenie) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8.4px);
            -webkit-backdrop-filter: blur(8.4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            width: 80%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Pasek nawigacyjny */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Ikona logo - dynamiczny gradient */
        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--v-gradient-start) 0%, var(--v-gradient-mid) 50%, var(--v-gradient-end) 100%);
            box-shadow: 0 0 10px rgba(153, 0, 255, 0.5); /* Poświata fioletowa */
        }

        .logo-text {
            font-weight: bold;
            font-size: 1.1em;
            letter-spacing: 0.5px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        /* Główne treści */
        .main-content {
            text-align: center;
            padding: 40px 0;
        }

        /* Główny nagłówek z dynamicznym gradientem */
        .main-headline {
            font-size: 2.8em;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--v-gradient-start) 0%, var(--v-gradient-mid) 50%, var(--v-gradient-end) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent; /* Tekst przezroczysty, widać gradient */
        }

        .sub-headline {
            color: var(--text-secondary);
            font-size: 0.95em;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Sekcja przycisków akcji */
        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* Stylizacja przycisków */
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-discord {
            background-color: var(--accent-color);
            color: #111111; /* Ciemny tekst na jasnym tle */
        }

        .btn-discord:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Ikony Discord w przyciskach */
        .discord-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .outline-icon {
            opacity: 0.7;
        }

        /* Strzałka w przycisku Discord */
        .arrow-icon {
            font-size: 1.1em;
            font-weight: normal;
        }

    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header">
        <div class="logo-section">
            <div class="logo-icon"></div>
            <div class="logo-text">V-Bot Music</div>
        </div>
        <div class="header-buttons">
            <a href="#" class="btn btn-outline" style="border-color: var(--v-gradient-start);">
                <span class="outline-icon">💎</span> Kup Premium
            </a>
            <a href="#" class="btn btn-outline">

                </svg>
                Zaloguj

        </div>
    </div>

    <div class="main-content">
        <h1 class="main-headline">
            Twój ulubiony Bot Muzyczny<br>na Discord

                </svg>
                Dodaj do Discord <span class="arrow-icon">→</span>
            </a>
            <a href="#" class="btn btn-outline">Zobacz Komendy</a>
        </div>
    </div>
</div>

</body>
</html>

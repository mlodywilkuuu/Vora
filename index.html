<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora - Twój Asystent AI</title>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_7qh1u87qh1u87qh1-removebg-preview.png">
    <style>
        :root {
            /* KOLORY GRADIENTU Z LITERY V - DO TŁA STRONY I TEKSTU */
            --v-pink: #ff007f;
            --v-purple: #9900ff;
            --v-blue: #00ffff;
            
            /* KOLORY MENU "WYSPA" I ELEMENTÓW */
            --island-bg: rgba(255, 255, 255, 0.03); /* Przezroczyste tło wyspy */
            --island-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: var(--v-blue);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            /* TŁO STRONY W GRADIENTU V */
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Dodatkowy pseudo-element dla efektu przyciemnienia tła */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); /* Lekkie przyciemnienie gradientu */
            z-index: -1;
        }

        /* MENU "WYSPA" - UPROSZCZONE */
        .glass-island-menu {
            position: fixed;
            top: 30px; /* Odległość od góry strony */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1000px;
            background: var(--island-bg);
            border-radius: 50px; /* Zaokrąglone rogi wyspy */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--island-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        /* LOGO GEMINI (używane jako logo Vora) */
        .logo-img {
            height: 35px;
            width: auto;
        }

        /* PRZYCISKI W MENU */
        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.85em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login {
            background-color: var(--accent-color);
            color: #111111;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        /* GŁÓWNA TREŚĆ STRONY */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 150px 20px 80px; /* Padding od góry, pod menu */
            box-sizing: border-box;
        }

        .main-content {
            text-align: center;
            max-width: 800px;
        }

        /* GŁÓWNY NAGŁÓWEK */
        .main-headline {
            font-size: 3.5em;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .headline-text-white {
            color: #ffffff;
        }

        .headline-text-gradient {
            background: linear-gradient(135deg, var(--v-pink) 0%, var(--v-purple) 50%, var(--v-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub-headline {
            color: var(--text-secondary);
            font-size: 1.1em;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* SEKTSJA PRZYCISKÓW CTA */
        .cta-buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .cta-button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-cta {
            padding: 15px 30px;
            font-size: 1em;
        }

        .btn-cta-secondary {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-cta-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* MNIEJSZY TEKST POD PRZYCISKAMI */
        .cta-subtext {
            color: var(--text-secondary);
            font-size: 0.75em;
            margin-top: 5px;
        }

    </style>
</head>
<body>

<div class="glass-island-menu">
    <div class="logo-section">
        <img src="Gemini_Generated_Image_7qh1u87qh1u87qh1-removebg-preview.png" alt="Vora Logo" class="logo-img">
    </div>
    <div class="header-buttons">
        <a href="logowanie.html" class="btn btn-login">Zaloguj</a>
    </div>
</div>

<div class="main-container">
    <div class="main-content">
        <h1 class="main-headline">
            <span class="headline-text-white">Odkryj co chcesz,</span><br>
            <span class="headline-text-gradient">kiedy chcesz...</span>
        </h1>
        <p class="sub-headline">
            Z płynnym przetwarzaniem i niezawodną wydajnością. Czysta inteligencja. Zero problemów. Twój najlepszy asystent AI.
        </p>
        
        <div class="cta-buttons-wrapper">
            <div class="cta-button-group">
                <a href="logowanie.html" class="btn btn-login btn-cta">
                    Rozpocznij konwersację <span class="arrow-icon">→</span>
                </a>
                <span class="cta-subtext">Połącz w 5 sekund</span>
            </div>
            
            <div class="cta-button-group">
                <a href="#" class="btn btn-cta btn-cta-secondary">Zobacz możliwości</a>
                <span class="cta-subtext">Pełna dokumentacja</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
